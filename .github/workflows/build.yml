name: Build Countdown EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name "倒计时器" countdown_float.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: 倒计时器-exe
          path: dist/倒计时器.exe
          retention-days: 7
